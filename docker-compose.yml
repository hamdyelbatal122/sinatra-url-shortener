services:
  app:
    build:
      context: .
      target: runtime
    ports:
      - "4567:4567"
    environment:
      RACK_ENV: development
      DATABASE_URL: sqlite:///app/db/development.sqlite3
      SESSION_SECRET: dev-secret-change-me-must-be-at-least-64-characters-long-key-to-avoid-rack-session-error
      SMTP_HOST: mailhog
      SMTP_PORT: "1025"
      MAIL_FROM: noreply@shortener.local
    volumes:
      - .:/app
      - gems:/usr/local/bundle
    depends_on:
      mailhog:
        condition: service_started
    command: bundle exec rackup -p 4567 -o 0.0.0.0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:4567/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"
      - "8025:8025"
    restart: unless-stopped

volumes:
  gems:
