version: '3.8'

services:
  app:
    build: .
    ports:
      - "4567:4567"
    environment:
      RACK_ENV: development
      DATABASE_URL: sqlite:///app/db/development.sqlite3
      SESSION_SECRET: dev-secret-key
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
    volumes:
      - .:/app
    depends_on:
      - mailhog
    command: bundle exec rackup -p 4567 -o 0.0.0.0

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"
      - "8025:8025"
